name: Build RxCMVS Exe

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    strategy:
      matrix:
        # 定義架構與配置
        include:
          - preset: x86-release
            arch: Win32
          - preset: x64-release
            arch: x64

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: CMake Configure
      # -G "Visual Studio 17 2022" 會直接覆蓋 Preset 裡的 Ninja，改用 VS2022 引擎編譯
      # -A 指定 32 位元 (Win32) 或 64 位元 (x64)
      run: |
        cmake --preset ${{ matrix.preset }} -G "Visual Studio 17 2022" -A ${{ matrix.arch }}

    - name: CMake Build
      run: |
        cmake --build .build/${{ matrix.preset }} --config Release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RxCMVS-${{ matrix.preset }}
        path: |
          .build/${{ matrix.preset }}/**/*.exe
