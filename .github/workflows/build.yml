name: Build RxCMVS Exe

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # 允許網頁上手動點擊執行

jobs:
  build-windows:
    runs-on: windows-latest
    
    strategy:
      matrix:
        # 同時編譯 x86 與 x64 的 Release 版本
        preset: [x86-release, x64-release]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive # 如果專案有依賴其他子模組，會一併拉取

    - name: Setup CMake and Ninja
      uses: lukka/get-cmake@latest
      # windows-latest 預設已內建 CMake 與 Ninja，此步驟可確保最新版與環境穩定

    - name: Configure Developer Command Prompt for MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        # 根據矩陣中的 preset 名稱，動態切換對應的編譯器架構 (x86 或 x64)
        arch: ${{ contains(matrix:preset, 'x86') && 'x86' || 'x64' }}

    - name: CMake Configure
      run: |
        cmake --preset ${{ matrix.preset }}

    - name: CMake Build
      run: |
        cmake --build --preset ${{ matrix.preset }}

    # 封裝產出的 exe 檔案（請根據 RxCMVS 的實際產出目標調整路徑，通常位於 .build 目錄內）
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RxCMVS-${{ matrix.preset }}
        path: |
          .build/${{ matrix.preset }}/**/*.exe
