name: Build RxCMVS Exe

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    strategy:
      matrix:
        # 只保留最乾淨的配置名稱
        preset: [x86-release, x64-release]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: CMake Configure
      # 移除所有手動指定編譯器的參數與 Action，讓 CMake 透過內建機制全自動掃描
      run: |
        cmake --preset ${{ matrix.preset }}

    - name: CMake Build
      run: |
        cmake --build .build/${{ matrix.preset }} --config Release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RxCMVS-${{ matrix.preset }}
        path: |
          .build/${{ matrix.preset }}/**/*.exe
