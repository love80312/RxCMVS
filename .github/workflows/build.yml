name: Build RxCMVS Exe

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    
    strategy:
      fail-fast: false
      matrix:
        # 建立 Preset 與您 CMake 輸出路徑（x32/x64）的對應關係
        include:
          - preset: x86-release
            out_dir: x32
          - preset: x64-release
            out_dir: x64

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup CMake and Ninja
      uses: lukka/get-cmake@latest

    - name: Configure Developer Command Prompt for MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.out_dir == 'x32' && 'x86' || 'x64' }}

    - name: CMake Configure
      run: |
        cmake --preset ${{ matrix.preset }}

    - name: CMake Build
      run: |
        cmake --build .build/${{ matrix.preset }} --config Release

    # 5. 依據您的 CMakeLists.txt 設定，精準到 .bin 資料夾打包成品
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RxCMVS-${{ matrix.preset }}
        path: |
          .bin/${{ matrix.out_dir }}/release/*.exe
